[metadata]
name = "Git + Lazygit Config"
supported_distros = ["manjaro", "ubuntu", "mac"]

[[symlinks]]
src = "~/dotfiles/src/git/lazygit"
dst = "~/.config/lazygit"

[[symlinks]]
src = "~/dotfiles/src/git/.gitconfig"
dst = "~/.gitconfig"

[[deps]]
id = "lazygit"
[deps.install_method]
ubuntu = "sh ~/dotfiles/git/lazygit/ubuntu_install.sh"
manjaro = "sudo pacman -S lazygit"
mac = "brew install lazygit"
