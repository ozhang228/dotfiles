# BEGIN_KITTY_THEME
include current-theme.conf
# END_KITTY_THEME

# -- Fonts --
font_family         JetBrainsMono Nerd Font Mono Regular
bold_font           JetBrainsMono Nerd Font Mono Extrabold
italic_font         JetBrainsMono Nerd Font Mono Italic
bold_italic_font    JetBrainsMono Nerd Font Mono ExtraBold Italic
font_size           12
symbol_map U+E000-U+E00A,U+EA60-U+EBEB,U+E0A0-U+E0C8,U+E0CA,U+E0CC-U+E0D7,U+E200-U+E2A9,U+E300-U+E3E3,U+E5FA-U+E6B5,U+E700-U+E7C5,U+ED00-U+EFC1,U+F000-U+F2FF,U+F300-U+F372,U+F400-U+F533,U+F0001-U+F1AF0 JetBrainsMono Nerd Font Mono


# -- UI --
tab_bar_min_tabs            1
tab_bar_edge                top
tab_bar_style               powerline
tab_powerline_style         slanted
tab_title_template          {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}

window_padding_width 3
enabled_layouts splits,horizontal
background_opacity 0.9
background_blur 1

enable_audio_bell no
visual_bell_duration 0.1
bell_on_tab "🔔 "

# -- Keys --
map f12>shift+h previous_tab
map ctrl+b>shift+h previous_tab

map f12>shift+l next_tab
map ctrl+b>shift+l next_tab

map f12>b select_tab
map ctrl+b>b select_tab

map f12>c new_tab_with_cwd
map ctrl+b>c new_tab_with_cwd

map f12>t new_tab
map ctrl+b>t new_tab

map f12>q close_window
map ctrl+b>q close_window

map f12>1 goto_tab 1
map ctrl+b>1 goto_tab 1

map f12>2 goto_tab 2
map ctrl+b>2 goto_tab 2

map f12>3 goto_tab 3
map ctrl+b>3 goto_tab 3

map f12>4 goto_tab 4
map ctrl+b>4 goto_tab 4

map f12>5 goto_tab 5
map ctrl+b>5 goto_tab 5

map f12>6 goto_tab 6
map ctrl+b>6 goto_tab 6

map f12>7 goto_tab 7
map ctrl+b>7 goto_tab 7

map f12>8 goto_tab 8
map ctrl+b>8 goto_tab 8

map f12>9 goto_tab 9
map ctrl+b>9 goto_tab 9

map f12>0 goto_tab 10
map ctrl+b>0 goto_tab 10

map f12>m detach_window ask
map ctrl+b>m detach_window ask

map f12>| launch --location=vsplit --cwd=current
map ctrl+b>| launch --location=vsplit --cwd=current

map f12>\ launch --location=hsplit --cwd=current
map ctrl+b>\ launch --location=hsplit --cwd=current

map f12>l neighboring_window right
map ctrl+b>l neighboring_window right

map f12>h neighboring_window left
map ctrl+b>h neighboring_window left

map f12>j neighboring_window bottom
map ctrl+b>j neighboring_window bottom

map f12>k neighboring_window top
map ctrl+b>k neighboring_window top

