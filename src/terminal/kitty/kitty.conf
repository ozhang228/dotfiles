# BEGIN_KITTY_THEME
include current-theme.conf
# END_KITTY_THEME

# -- Remote control (required for kitty-load) --
allow_remote_control yes
listen_on unix:/tmp/mykitty-{kitty_pid}

# -- Fonts --
font_family         JetBrainsMono Nerd Font Mono Regular
bold_font           JetBrainsMono Nerd Font Mono Extrabold
italic_font         JetBrainsMono Nerd Font Mono Italic
bold_italic_font    JetBrainsMono Nerd Font Mono ExtraBold Italic
font_size           12
tabstop              4
symbol_map U+E000-U+E00A,U+EA60-U+EBEB,U+E0A0-U+E0C8,U+E0CA,U+E0CC-U+E0D7,U+E200-U+E2A9,U+E300-U+E3E3,U+E5FA-U+E6B5,U+E700-U+E7C5,U+ED00-U+EFC1,U+F000-U+F2FF,U+F300-U+F372,U+F400-U+F533,U+F0001-U+F1AF0 JetBrainsMono Nerd Font Mono


# -- UI --
tab_bar_style               hidden

window_padding_width 3
enabled_layouts splits,horizontal
background_opacity 1.0

# WORKAROUND: nvidia-driver-595.71.05 has a GL segfault bug (libnvidia-glcore SIGSEGV
# in send_cell_data_to_gpu). This reduces GPU sync pressure to make crashes less frequent.
# Remove once Ubuntu ships 595.80+ (check: apt-cache policy nvidia-driver-595).
sync_to_monitor no

enable_audio_bell no
visual_bell_duration 0.1
bell_on_tab "🔔 "

# -- Keys --
map ctrl+k>shift+h previous_tab

map ctrl+k>shift+l next_tab

map ctrl+k>n move_tab_forward

map ctrl+k>p move_tab_backward

map ctrl+k>b select_tab

map ctrl+k>c new_tab_with_cwd

map ctrl+k>t new_tab

map ctrl+k>q close_window

map ctrl+k>1 goto_tab 1

map ctrl+k>2 goto_tab 2

map ctrl+k>3 goto_tab 3

map ctrl+k>4 goto_tab 4

map ctrl+k>5 goto_tab 5

map ctrl+k>6 goto_tab 6

map ctrl+k>7 goto_tab 7

map ctrl+k>8 goto_tab 8

map ctrl+k>9 goto_tab 9

map ctrl+k>0 goto_tab 10

map ctrl+k>m detach_window ask

map ctrl+k>| launch --location=vsplit --cwd=current

map ctrl+k>\ launch --location=hsplit --cwd=current

map ctrl+k>l neighboring_window right

map ctrl+k>h neighboring_window left

map ctrl+k>j neighboring_window bottom

map ctrl+k>k neighboring_window top

