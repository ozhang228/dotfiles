[metadata]
name = "Kitty Config"
supported_distros = ["manjaro", "ubuntu", "mac"]

[[symlinks]]
src = "~/dotfiles/src/terminal/kitty"
dst = "~/.config/kitty"

[[symlinks]]
src = "~/dotfiles/src/terminal/kitty/kitty-load.sh"
dst = "~/.local/bin/kitty-load"

[[deps]]
id = "kitty"
[deps.install_method]
ubuntu = "sudo apt install kitty"
manjaro = "sudo pacman -S kitty"
mac = "brew install kitty"
