[python]
disabled = false
symbol = ' '
style = "bg:overlay fg:pine"
format = " [](fg:overlay)[ $symbol$version( $virtualenv) ](bg:overlay fg:pine)[](fg:overlay)"

[conda]
disabled = false
symbol = '🅒 '
style = "bg:overlay fg:pine"
format = " [](fg:overlay)[ $symbol$environment ](bg:overlay fg:pine)[](fg:overlay)"
