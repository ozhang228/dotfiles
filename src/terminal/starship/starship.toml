"$schema" = 'https://starship.rs/config-schema.json'

scan_timeout = 100

format = """
$username\
$directory\
$git_branch\
$git_metrics\
$git_status\
$fill\
$c\
$elixir\
$elm\
$golang\
$haskell\
$java\
$julia\
$nodejs\
$nim\
$rust\
$scala\
$conda\
$python\
$time\
$line_break\
$character"""

palette = "rose-pine-moon"

[palettes.rose-pine-moon]
overlay = '#393552'
love = '#eb6f92'
gold = '#f6c177'
rose = '#ea9a97'
pine = '#3e8fb0'
foam = '#9ccfd8'
iris = '#c4a7e7'

[username]
disabled = false
format = "[î‚¶](fg:overlay)[ َ°§± $user ](bg:overlay fg:iris)[î‚´](fg:overlay) "
show_always = true
style_root = "bg:overlay fg:iris"
style_user = "bg:overlay fg:iris"

[directory]
format = "[î‚¶](fg:overlay)[ َ°‰‹ $path ](bg:overlay fg:gold)[î‚´](fg:overlay) "
style = "bg:overlay fg:pine"
truncation_length = 3
truncation_symbol = "â€¦/"
truncate_to_repo = true
read_only = "َ°Œ¾"
home_symbol = "~"

[directory.substitutions]
Documents = "َ°ˆ™"
Downloads = " "
Music = " "
Pictures = " "

[fill]
style = "fg:overlay"
symbol = " "

[git_branch]
format = "[î‚¶](fg:overlay)[ ïگک $branch ](bg:overlay fg:foam)"
style = "bg:overlay fg:foam"
symbol = ""

[git_status]
disabled = false
format = '[î‚´](fg:overlay) '
up_to_date = ''
untracked = ''
stashed = ''
modified = ''
renamed = ''
deleted = ''
staged = ''
ahead = ''
behind = ''
diverged = ''

[git_metrics]
disabled = false
added_style = "bg:overlay fg:foam"
deleted_style = "bg:overlay fg:love"
format = "([+$added ]($added_style)[-$deleted ]($deleted_style))"

[time]
disabled = false
format = " [î‚¶](fg:overlay)[ $time َ°´ˆ ](bg:overlay fg:rose)[î‚´](fg:overlay)"
style = "bg:overlay fg:rose"
time_format = "%I:%M%P"
use_12hr = true

[character]
disabled = false
success_symbol = '[َ±‍ھ](bold fg:iris)'
error_symbol = '[َ±‍ھ](bold fg:love)'

[line_break]
disabled = false

# -- Languages --

[c]
disabled = false
symbol = " "
style = "bg:overlay fg:pine"
format = " [î‚¶](fg:overlay)[ $symbol$version ](bg:overlay fg:pine)[î‚´](fg:overlay)"

[elixir]
disabled = false
symbol = " "
style = "bg:overlay fg:pine"
format = " [î‚¶](fg:overlay)[ $symbol$version ](bg:overlay fg:pine)[î‚´](fg:overlay)"

