# -- Prefix --
set -g prefix C-b
set -g prefix2 F12
unbind C-b
bind C-b send-prefix
bind F12 send-prefix

# -- General --
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -sg escape-time 0
set -g focus-events on
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g status-position top

# -- Copy mode (vi-style) --
set -g mode-keys vi
bind Escape copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "copyq add -"

# -- Pane splits --
unbind '"'
unbind %
bind '|' split-window -h -c "#{pane_current_path}"
bind '\' split-window -v -c "#{pane_current_path}"

# -- Sessionizer --
bind f display-popup -w 99% -h 99% -E "~/.config/tmux/sessionizer.sh"

# -- Pane management --
bind q kill-pane

# -- Window selection: do nothing (no error) if the window doesn't exist --
bind 0 if-shell "tmux list-windows -F '#I' | grep -qx 0" "select-window -t :=0"
bind 1 if-shell "tmux list-windows -F '#I' | grep -qx 1" "select-window -t :=1"
bind 2 if-shell "tmux list-windows -F '#I' | grep -qx 2" "select-window -t :=2"
bind 3 if-shell "tmux list-windows -F '#I' | grep -qx 3" "select-window -t :=3"
bind 4 if-shell "tmux list-windows -F '#I' | grep -qx 4" "select-window -t :=4"
bind 5 if-shell "tmux list-windows -F '#I' | grep -qx 5" "select-window -t :=5"
bind 6 if-shell "tmux list-windows -F '#I' | grep -qx 6" "select-window -t :=6"
bind 7 if-shell "tmux list-windows -F '#I' | grep -qx 7" "select-window -t :=7"
bind 8 if-shell "tmux list-windows -F '#I' | grep -qx 8" "select-window -t :=8"
bind 9 if-shell "tmux list-windows -F '#I' | grep -qx 9" "select-window -t :=9"

# -- Plugins (TPM) --
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'rose-pine/tmux'
set -g @rose_pine_variant 'moon'
set -g @rose_pine_disable_active_window_menu 'on'
set -g @rose_pine_session_icon ''

run '~/.config/tmux/plugins/tpm/tpm'

# -- Window list: directory + git branch (overrides theme defaults) --
set -g window-status-format "#[fg=#e0def4,bg=#393552] #I. #[fg=#9ccfd8]󰃋 #{b:pane_current_path}#[fg=#ea9a97]#{?#{!=:#(cd #{pane_current_path} 2>/dev/null && git branch --show-current 2>/dev/null),}, ( #(cd #{pane_current_path} 2>/dev/null && git branch --show-current 2>/dev/null)),}#[fg=#e0def4,bg=#393552] #[default]"
set -g window-status-current-format "#[fg=#232136,bg=#f6c177] #I. #[fg=#232136]󰃋 #{b:pane_current_path}#[fg=#232136]#{?#{!=:#(cd #{pane_current_path} 2>/dev/null && git branch --show-current 2>/dev/null),}, ( #(cd #{pane_current_path} 2>/dev/null && git branch --show-current 2>/dev/null)),}#[fg=#232136,bg=#f6c177] #[default]"
