# -- Prefix --
# F12 primary, ctrl+b fallback for laptop
set -g prefix F12
set -g prefix2 C-b
unbind C-b

# -- General --
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g history-limit 50000
set -g focus-events on

# -- Windows --
bind H previous-window
bind L next-window
bind -r n swap-window -d -t +1
bind -r p swap-window -d -t -1
bind c new-window -c "#{pane_current_path}"
bind q kill-pane
bind b choose-tree -w
bind s choose-tree -s

# -- Splits (basic) --
bind | split-window -h -c "#{pane_current_path}"
bind \\ split-window -v -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# -- Clipboard (copyq) --
set -g set-clipboard off
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "copyq copy"

# -- Status bar (minimal, top) --
set -g status-position top
set -g status-left " [#S] "
set -g status-right ""
set -g status-style "bg=default,fg=white"
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g window-status-current-style "bold,fg=cyan"

# -- Plugins (TPM) --
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'

run '~/.tmux/plugins/tpm/tpm'
