[metadata]
name = "Nvim Config"
supported_distros = ["manjaro", "ubuntu", "mac"]

[[symlinks]]
src = "~/dotfiles/nvim"
dst = "~/.config/nvim"

[[env_vars]]
type = "required"
key = "AI_CLI_CMD"

[[deps]]
id = "ripgrep"
[deps.install_method]
ubuntu = "sudo apt install ripgrep"
manjaro = "sudo pacman -S ripgrep"
mac = "brew install ripgrep"

[[deps]]
id = "fzf"
[deps.install_method]
ubuntu = "sudo apt install fzf"
manjaro = "sudo pacman -S fzf"
mac = "brew install fzf"

[[deps]]
id = "gh"
[deps.install_method]
ubuntu = "sudo apt install gh"
manjaro = "sudo pacman -S github-cli"
mac = "brew install gh"

[[deps]]
id = "lazygit"
[deps.install_method]
ubuntu = "sudo apt install lazygit"
manjaro = "sudo pacman -S lazygit"
mac = "brew install lazygit"

[[deps]]
id = "clang-tidy"
[deps.install_method]
ubuntu = "sudo apt install clang-tools"
manjaro = "sudo pacman -S clang"
mac = "brew install llvm"

[[deps]]
id = "treesitter-cli"
[deps.install_method]
ubuntu = "cargo install tree-sitter-cli"
manjaro = "cargo install tree-sitter-cli"
mac = "cargo install tree-sitter-cli"

[[deps]]
id = "mmdc"
[deps.install_method]
ubuntu = "npm install -g @mermaid-js/mermaid-cli"
manjaro = "npm install -g @mermaid-js/mermaid-cli"
mac = "npm install -g @mermaid-js/mermaid-cli"

[[deps]]
id = "clipboard_manager"
[deps.install_method]
ubuntu = "sudo apt install xclip"
manjaro = "sudo pacman -S xclip"
mac = "echo 'Built-in pbcopy/pbpaste'"

[[deps]]
id = "font"
[deps.install_method]
ubuntu = "mkdir -p ~/.local/share/fonts && cd ~/.local/share/fonts && curl -L https://github.com/JetBrains/JetBrainsMono/releases/download/v2.304/JetBrainsMono-2.304.zip -o jbm.zip && unzip -o jbm.zip && rm jbm.zip && fc-cache -f -v"
manjaro = "sudo pacman -S ttf-jetbrains-mono"
mac = "brew tap homebrew/cask-fonts && brew install font-jetbrains-mono"
